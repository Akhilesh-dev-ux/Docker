services:
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: employee_db

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

    networks:
      - employee-network

  backend:
    build:
      context: ./backend

    image: employee-backend:v1
    container_name: backend-app

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      PORT: 5000
      DB_HOST: mysql-db
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: employee_db

    ports:
      - "5000:5000"

    networks:
      - employee-network

networks:
  employee-network:
    driver: bridge

volumes:
  mysql-data:
